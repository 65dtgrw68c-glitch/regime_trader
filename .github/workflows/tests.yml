name: tests

# Runs the full pytest suite on GitHub's cloud runners.
# No local Python or git install is required — GitHub provides everything.

on:
  push:
    branches: ["**"]      # run on every branch push
  pull_request:
  workflow_dispatch:       # allows manual "Run workflow" button in the Actions tab

jobs:
  pytest:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Test-time deps only — enough to import and exercise the modules.
          pip install numpy pandas scikit-learn hmmlearn pytest pytest-cov

      - name: Run test suite
        run: |
          pytest -v --cov=core --cov-report=term-missing
